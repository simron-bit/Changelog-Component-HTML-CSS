<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A responsive changelog component for a website using HTML and CSS">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <title>Changelog Component</title>
</head>
<body>
    <main>
        <div id="main-box">
            <div id="head">
                <h1>Changelog</h1> <br>
                <p class="low-opacity">Here is everything we have shipped in the last few days</p>
            </div>
            <div id="changelog">
                <div id="dates" class="low-opacity">
                    <p>July 1<span>, 2026</span></p>
                    <p>July 4<span>, 2026</span></p>
                    <p>July 19<span>, 2026</span></p>
                    <p>July 31<span> ,2026</span></p>
                    <p>August 5<span>, 2026</span></p>
                    <p>August 17<span>, 2026</span></p>
                </div>
                <div id="pointers">
                    <p>&#x25CF;</p>
                    <p>&#x25CF;</p>
                    <p>&#x25CF;</p>
                    <p>&#x25CF;</p>
                    <p>&#x25CF;</p>
                    <p>&#x25CF;</p>
                </div>
                <div id="items">
                    <p>Lipstick</p>
                    <p>Eyeliner</p>
                    <p>Blush</p>
                    <p>Body wash</p>
                    <p>Foundation</p>
                    <p>Concealer</p>
                </div>
            </div>
            <div id="btn">
                <button id="view-btn">View Entire Changelog</button>
            </div>
        </div>
    </main>
</body>
</html>
